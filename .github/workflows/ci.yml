# CI — verificação automática a cada push e pull request.
# Roda: instalação, checagem de tipos, lint e testes (inclui os golden
# tests obrigatórios do Calculations.md §11 — se um quebrar, o CI falha).
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Checagem de tipos (TypeScript)
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm run test
